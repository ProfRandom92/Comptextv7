<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Comptextv7 architecture preview</title>
  <desc id="desc">Cloud-first validation architecture diagram showing GitHub Actions authority, artifact publishing, degraded local runner, and showcase consumers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071827"/><stop offset=".5" stop-color="#0a1021"/><stop offset="1" stop-color="#190b32"/></linearGradient>
    <radialGradient id="glow" cx="12%" cy="2%" r="74%"><stop offset="0" stop-color="#1ad8ff" stop-opacity=".2"/><stop offset="1" stop-color="#1ad8ff" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="62" height="62" patternUnits="userSpaceOnUse" patternTransform="skewX(-12)"><path d="M62 0H0V62" fill="none" stroke="#75a7d8" stroke-opacity=".14"/></pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5fe8ff"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity=".5"/></filter>
    <style>.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.mono{font-family:"SFMono-Regular","JetBrains Mono",Consolas,monospace}.lane{fill:#070e1c;stroke:#5f83ae;stroke-opacity:.72}.box{fill:#101a2d;stroke:#6b9bd0;stroke-opacity:.82}.text{fill:#edf5ff}.muted{fill:#c3d1e3}.cyan{fill:#82f1ff}.warn{fill:#ffd28a}.flow{fill:none;stroke:#5fe8ff;stroke-width:3;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#glow)"/><rect width="1600" height="900" fill="url(#grid)"/>
  <g class="sans">
    <text x="72" y="101" font-size="42" font-weight="850" class="text">Cloud-first validation architecture</text>
    <text x="74" y="139" font-size="23" class="muted">GitHub Actions remains authoritative; local execution is a degraded status layer.</text>
    <rect x="1230" y="70" width="177" height="29" rx="15" fill="#071321" stroke="#61e8ff"/><text x="1246" y="90" font-size="14" font-weight="850" letter-spacing="1" class="cyan">OPEN GRAPH READY</text>
  </g>
  <g filter="url(#shadow)" class="sans">
    <g><rect x="78" y="190" width="272" height="520" rx="18" class="lane"/><text x="100" y="222" font-size="17" font-weight="850" class="text">Source + Fixtures</text></g>
    <g><rect x="460" y="190" width="390" height="520" rx="18" class="lane"/><text x="482" y="222" font-size="17" font-weight="850" class="text">Cloud Authority</text></g>
    <g><rect x="930" y="190" width="360" height="520" rx="18" class="lane"/><text x="952" y="222" font-size="17" font-weight="850" class="text">Published Evidence</text></g>
    <g><rect x="1168" y="548" width="342" height="262" rx="18" class="lane"/><text x="1190" y="581" font-size="17" font-weight="850" class="text">Showcase Consumers</text></g>
    <g text-anchor="middle" font-size="18"><rect x="130" y="290" width="168" height="84" rx="18" class="box"/><text x="214" y="331" font-weight="850" class="text">Synthetic diagnostic</text><text x="214" y="356" class="text">fixtures</text></g>
    <g text-anchor="middle" font-size="18"><rect x="130" y="456" width="168" height="84" rx="18" class="box"/><text x="214" y="497" font-weight="850" class="text">Parser + KVTC-V7</text><text x="214" y="522" class="text">frame builder</text></g>
    <g text-anchor="middle" font-size="19"><rect x="540" y="260" width="230" height="94" rx="18" class="box"/><text x="655" y="302" font-weight="850" class="text">GitHub Actions</text><text x="655" y="326" class="text">CI authority</text></g>
    <g text-anchor="middle" font-size="19"><rect x="540" y="430" width="230" height="94" rx="18" class="box"/><text x="655" y="471" font-weight="850" class="text">Replay / forensic</text><text x="655" y="496" class="text">contract checks</text></g>
    <g text-anchor="middle" font-size="19"><rect x="540" y="600" width="230" height="94" rx="18" class="box"/><text x="655" y="641" font-weight="850" class="text">CFI artifact</text><text x="655" y="666" class="text">publishing</text></g>
    <g text-anchor="middle" font-size="19"><rect x="995" y="296" width="200" height="83" rx="18" class="box"/><text x="1095" y="337" font-weight="850" class="text">Summary JSON</text><text x="1095" y="361" class="text">reports</text></g>
    <g text-anchor="middle" font-size="19"><rect x="995" y="466" width="200" height="83" rx="18" class="box"/><text x="1095" y="507" font-weight="850" class="text">Uploaded CI</text><text x="1095" y="531" class="text">artifacts</text></g>
    <g text-anchor="middle" font-size="19"><rect x="1234" y="625" width="216" height="84" rx="18" class="box"/><text x="1342" y="666" font-weight="850" class="text">README / Vercel</text><text x="1342" y="691" class="text">dashboard</text></g>
    <path class="flow" d="M214 374V456"/><path class="flow" d="M298 498 C390 430 470 360 540 307"/><path class="flow" d="M655 354V430"/><path class="flow" d="M655 524V600"/><path class="flow" d="M770 647 C855 598 907 540 995 508"/><path class="flow" d="M770 647 C850 540 920 425 995 338"/><path class="flow" d="M1195 508 C1218 570 1218 625 1234 667"/><path class="flow" d="M1195 338 C1210 475 1218 605 1234 667"/>
    <g><rect x="96" y="742" width="524" height="70" rx="18" fill="#211318" stroke="#ffc46a"/><text x="124" y="779" font-size="21" font-weight="850" class="warn">Degraded local runner</text><text x="124" y="806" font-size="15" fill="#ead1ad">status-only fallback; cloud remains authoritative</text></g>
    <path class="flow" d="M620 777 C636 737 645 710 655 694"/>
    <g><rect x="790" y="746" width="316" height="66" rx="16" fill="#0a1424" stroke="#5f83ae" stroke-opacity=".8"/><text x="816" y="780" font-size="12" font-weight="850" class="mono cyan">AUTHORITATIVE CLOUD</text><text x="816" y="807" font-size="16" font-weight="800" class="text">CI artifacts feed showcase surfaces</text></g>
  </g>
</svg>
