<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Comptextv7 architecture preview</title>
  <desc id="desc">Clean cloud-first validation architecture with structured enterprise lanes, deterministic CI authority, artifact publishing, replay evidence, and showcase consumers.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#4d5b70"/></marker>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif}.mono{font-family:&quot;SFMono-Regular&quot;,&quot;JetBrains Mono&quot;,Consolas,monospace}
      .bg{fill:#f6f7f9}.ink{fill:#17202e}.muted{fill:#657287}.subtle{fill:#8d97a8}.lane{fill:#ffffff;stroke:#d8dee8;stroke-width:1.2}.lane-head{fill:#eef2f7}.box{fill:#fbfcfe;stroke:#cfd7e3;stroke-width:1.2}.authority{fill:#eef7f0;stroke:#9ed3af}.artifact{fill:#eef3ff;stroke:#adc3fb}.warn{fill:#fff6e5;stroke:#e5bd72}.consumer{fill:#f4f1ff;stroke:#c7bdf4}.flow{fill:none;stroke:#4d5b70;stroke-width:2.4;marker-end:url(#arrow)}.thin{stroke:#e5e9f0;stroke-width:1}.h1{font-size:36px;font-weight:850}.h2{font-size:16px;font-weight:850}.small{font-size:13px}.micro{font-size:11px;font-weight:850;letter-spacing:.5px}
    </style>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <g class="sans">
    <text x="72" y="92" class="h1 ink">Cloud-first validation architecture</text>
    <text x="74" y="126" font-size="18" class="muted">Deterministic evidence is produced in GitHub Actions, published as artifacts, and rendered by README and dashboard consumers.</text>
    <rect x="1296" y="68" width="190" height="34" rx="17" fill="#ffffff" stroke="#d8dee8"/><text x="1315" y="90" class="micro muted">ENTERPRISE DIAGRAM</text>
  </g>
  <g class="sans">
    <rect x="64" y="172" width="1472" height="116" rx="14" class="lane"/>
    <rect x="64" y="172" width="1472" height="42" rx="14" class="lane-head"/><text x="90" y="199" class="h2 ink">1 · Source and fixtures</text>
    <g transform="translate(110 232)"><rect width="230" height="38" rx="8" class="box"/><text x="18" y="24" class="small ink">Synthetic diagnostic logs</text></g>
    <g transform="translate(420 232)"><rect width="230" height="38" rx="8" class="box"/><text x="18" y="24" class="small ink">Parser contracts</text></g>
    <g transform="translate(730 232)"><rect width="230" height="38" rx="8" class="box"/><text x="18" y="24" class="small ink">KVTC-V7 frame builder</text></g>
    <g transform="translate(1040 232)"><rect width="230" height="38" rx="8" class="box"/><text x="18" y="24" class="small ink">Locked fixture seed</text></g>
  </g>
  <g class="sans">
    <rect x="64" y="332" width="1472" height="160" rx="14" class="lane"/>
    <rect x="64" y="332" width="1472" height="42" rx="14" class="lane-head"/><text x="90" y="359" class="h2 ink">2 · Cloud authority lane</text>
    <g transform="translate(110 398)"><rect width="250" height="62" rx="10" class="authority"/><text x="18" y="25" class="small ink" font-weight="850">GitHub Actions CI</text><text x="18" y="46" class="small muted">authoritative execution</text></g>
    <g transform="translate(442 398)"><rect width="250" height="62" rx="10" class="authority"/><text x="18" y="25" class="small ink" font-weight="850">Contract checks</text><text x="18" y="46" class="small muted">schema, hash, replay</text></g>
    <g transform="translate(774 398)"><rect width="250" height="62" rx="10" class="authority"/><text x="18" y="25" class="small ink" font-weight="850">Deterministic outputs</text><text x="18" y="46" class="small muted">byte-stable summaries</text></g>
    <g transform="translate(1106 398)"><rect width="250" height="62" rx="10" class="authority"/><text x="18" y="25" class="small ink" font-weight="850">Status gate</text><text x="18" y="46" class="small muted">pass/fail evidence</text></g>
  </g>
  <g class="sans">
    <rect x="64" y="536" width="1472" height="150" rx="14" class="lane"/>
    <rect x="64" y="536" width="1472" height="42" rx="14" class="lane-head"/><text x="90" y="563" class="h2 ink">3 · Published evidence lane</text>
    <g transform="translate(110 604)"><rect width="250" height="52" rx="10" class="artifact"/><text x="18" y="23" class="small ink" font-weight="850">summary.json</text><text x="18" y="41" class="small muted">validation metrics</text></g>
    <g transform="translate(442 604)"><rect width="250" height="52" rx="10" class="artifact"/><text x="18" y="23" class="small ink" font-weight="850">replay.trace</text><text x="18" y="41" class="small muted">forensic sequence</text></g>
    <g transform="translate(774 604)"><rect width="250" height="52" rx="10" class="artifact"/><text x="18" y="23" class="small ink" font-weight="850">kvtc-v7.cfi</text><text x="18" y="41" class="small muted">compressed frames</text></g>
    <g transform="translate(1106 604)"><rect width="250" height="52" rx="10" class="artifact"/><text x="18" y="23" class="small ink" font-weight="850">audit manifest</text><text x="18" y="41" class="small muted">hash chain</text></g>
  </g>
  <g class="sans">
    <rect x="64" y="730" width="910" height="98" rx="14" class="lane"/>
    <rect x="64" y="730" width="910" height="42" rx="14" class="lane-head"/><text x="90" y="757" class="h2 ink">4 · Showcase consumers</text>
    <g transform="translate(110 790)"><rect width="210" height="28" rx="7" class="consumer"/><text x="16" y="19" class="small ink">README embeds</text></g>
    <g transform="translate(374 790)"><rect width="210" height="28" rx="7" class="consumer"/><text x="16" y="19" class="small ink">Vercel dashboard</text></g>
    <g transform="translate(638 790)"><rect width="210" height="28" rx="7" class="consumer"/><text x="16" y="19" class="small ink">OpenGraph preview</text></g>
  </g>
  <g class="sans">
    <rect x="1020" y="730" width="516" height="98" rx="14" class="warn"/>
    <text x="1050" y="762" class="h2 ink">Local runner status</text>
    <text x="1050" y="790" class="small muted">Local execution may assist development, but it is marked degraded and never overrides cloud evidence.</text>
    <text x="1050" y="815" class="mono small ink">authority = github_actions · fallback = status_only</text>
  </g>
  <path class="flow" d="M340 251 H410"/><path class="flow" d="M650 251 H720"/><path class="flow" d="M960 251 H1030"/>
  <path class="flow" d="M235 288 V398"/><path class="flow" d="M360 429 H442"/><path class="flow" d="M692 429 H774"/><path class="flow" d="M1024 429 H1106"/>
  <path class="flow" d="M235 492 V604"/><path class="flow" d="M567 492 V604"/><path class="flow" d="M899 492 V604"/><path class="flow" d="M1231 492 V604"/>
  <path class="flow" d="M235 686 V790"/><path class="flow" d="M567 686 V790"/><path class="flow" d="M899 686 C899 716 743 744 743 790"/>
  <path class="flow" d="M1231 686 V730"/>
  <g class="sans">
    <line x1="72" y1="856" x2="1528" y2="856" class="thin"/>
    <text x="72" y="882" class="small subtle">Comptextv7 · cloud-first narrative · deterministic validation messaging · no floating AI nodes</text>
  </g>
</svg>
