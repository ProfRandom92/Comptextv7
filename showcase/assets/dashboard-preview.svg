<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Comptextv7 dashboard preview</title>
  <desc id="desc">Realistic enterprise operations console showing cloud-first CI authority, deterministic artifact validation, replay traces, compression comparisons, and forensic audit indicators.</desc>
  <defs>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif}
      .mono{font-family:&quot;SFMono-Regular&quot;,&quot;JetBrains Mono&quot;,Consolas,monospace}
      .bg{fill:#f5f7fa}.panel{fill:#ffffff;stroke:#d8dee8;stroke-width:1.2}.panel-soft{fill:#fbfcfe;stroke:#d8dee8;stroke-width:1.2}
      .ink{fill:#17202e}.muted{fill:#647084}.subtle{fill:#8a94a6}.line{stroke:#d8dee8;stroke-width:1}.rule{stroke:#e8ecf2;stroke-width:1}
      .green{fill:#17803d}.green-bg{fill:#e8f5ee}.amber{fill:#a86408}.amber-bg{fill:#fff5df}.red{fill:#b42318}.red-bg{fill:#feeceb}.blue{fill:#235ee8}.blue-bg{fill:#edf3ff}
      .chip{font-size:13px;font-weight:750;letter-spacing:.3px}.h1{font-size:34px;font-weight:850}.h2{font-size:17px;font-weight:800}.small{font-size:13px}.micro{font-size:11px;letter-spacing:.45px}.mono12{font-size:12px}.mono13{font-size:13px}
    </style>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <rect x="0" y="0" width="1600" height="64" fill="#101723"/>
  <g class="sans">
    <text x="42" y="40" fill="#ffffff" font-size="20" font-weight="850">Comptextv7</text>
    <text x="166" y="40" fill="#aeb7c7" font-size="14">Cloud validation operations</text>
    <rect x="1260" y="18" width="132" height="28" rx="14" fill="#1c2736" stroke="#344258"/>
    <circle cx="1280" cy="32" r="5" fill="#3fb950"/>
    <text x="1294" y="37" fill="#dfe6f3" font-size="12" font-weight="750">CI AUTHORITY</text>
    <rect x="1410" y="18" width="144" height="28" rx="14" fill="#1c2736" stroke="#344258"/>
    <text x="1427" y="37" fill="#dfe6f3" font-size="12" font-weight="750">RUN 2026.05.12</text>
  </g>
  <g class="sans">
    <rect x="28" y="88" width="1544" height="92" rx="14" class="panel"/>
    <text x="58" y="129" class="ink h1">Deterministic artifact validation console</text>
    <text x="58" y="158" class="muted" font-size="16">Synthetic diagnostic logs are compressed into KVTC-V7 frames, replayed, validated, and published as cloud-first CI evidence.</text>
    <g transform="translate(1040 112)">
      <rect width="150" height="44" rx="10" class="green-bg"/><text x="18" y="18" class="micro green" font-weight="850">VALIDATED</text><text x="18" y="35" class="mono mono13 ink">128/128</text>
    </g>
    <g transform="translate(1210 112)">
      <rect width="150" height="44" rx="10" class="blue-bg"/><text x="18" y="18" class="micro blue" font-weight="850">ARTIFACTS</text><text x="18" y="35" class="mono mono13 ink">summary.json</text>
    </g>
    <g transform="translate(1380 112)">
      <rect width="150" height="44" rx="10" class="amber-bg"/><text x="18" y="18" class="micro amber" font-weight="850">LOCAL</text><text x="18" y="35" class="mono mono13 ink">degraded only</text>
    </g>
  </g>
  <g class="sans">
    <rect x="28" y="206" width="1018" height="312" rx="14" class="panel"/>
    <text x="58" y="244" class="h2 ink">Workflow timeline</text>
    <text x="58" y="269" class="small muted">GitHub Actions remains the authoritative execution environment.</text>
    <line x1="92" y1="330" x2="988" y2="330" stroke="#d4dbe7" stroke-width="2"/>
    <g transform="translate(92 305)">
      <circle cx="0" cy="25" r="12" fill="#17803d"/><text x="0" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">1</text>
      <text x="-12" y="67" class="mono mono12 ink">checkout</text><text x="-12" y="88" class="small muted">source + fixtures</text>
    </g>
    <g transform="translate(242 305)">
      <circle cx="0" cy="25" r="12" fill="#17803d"/><text x="0" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">2</text>
      <text x="-28" y="67" class="mono mono12 ink">parse logs</text><text x="-28" y="88" class="small muted">diagnostic corpus</text>
    </g>
    <g transform="translate(402 305)">
      <circle cx="0" cy="25" r="12" fill="#17803d"/><text x="0" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">3</text>
      <text x="-28" y="67" class="mono mono12 ink">build frames</text><text x="-28" y="88" class="small muted">KVTC-V7 payloads</text>
    </g>
    <g transform="translate(572 305)">
      <circle cx="0" cy="25" r="12" fill="#17803d"/><text x="0" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">4</text>
      <text x="-30" y="67" class="mono mono12 ink">replay</text><text x="-30" y="88" class="small muted">deterministic trace</text>
    </g>
    <g transform="translate(732 305)">
      <circle cx="0" cy="25" r="12" fill="#17803d"/><text x="0" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">5</text>
      <text x="-38" y="67" class="mono mono12 ink">contract checks</text><text x="-38" y="88" class="small muted">schema + hashes</text>
    </g>
    <g transform="translate(902 305)">
      <circle cx="0" cy="25" r="12" fill="#17803d"/><text x="0" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">6</text>
      <text x="-32" y="67" class="mono mono12 ink">publish</text><text x="-32" y="88" class="small muted">CI artifacts</text>
    </g>
    <rect x="58" y="438" width="958" height="52" rx="10" fill="#fbfcfe" stroke="#e1e6ef"/>
    <text x="78" y="469" class="mono mono13 ink">run_id=ci-7429 · sha=8f41c2d · seed=locked · output=deterministic · generated_at=2026-05-12T00:00:00Z</text>
  </g>
  <g class="sans">
    <rect x="1070" y="206" width="502" height="312" rx="14" class="panel"/>
    <text x="1100" y="244" class="h2 ink">Artifact validation states</text>
    <line x1="1100" y1="276" x2="1542" y2="276" class="line"/>
    <g class="mono mono13">
      <text x="1100" y="310" class="muted">artifact</text><text x="1325" y="310" class="muted">state</text><text x="1446" y="310" class="muted">hash</text>
      <line x1="1100" y1="328" x2="1542" y2="328" class="rule"/>
      <text x="1100" y="361" class="ink">summary.json</text><rect x="1320" y="342" width="78" height="26" rx="13" class="green-bg"/><text x="1337" y="360" class="green" font-weight="800">PASS</text><text x="1446" y="361" class="ink">sha256</text>
      <text x="1100" y="408" class="ink">replay.trace</text><rect x="1320" y="389" width="78" height="26" rx="13" class="green-bg"/><text x="1337" y="407" class="green" font-weight="800">PASS</text><text x="1446" y="408" class="ink">sha256</text>
      <text x="1100" y="455" class="ink">kvtc-v7.cfi</text><rect x="1320" y="436" width="78" height="26" rx="13" class="green-bg"/><text x="1337" y="454" class="green" font-weight="800">PASS</text><text x="1446" y="455" class="ink">sha256</text>
      <text x="1100" y="496" class="subtle">All evidence uploaded by cloud workflow; local execution is advisory.</text>
    </g>
  </g>
  <g class="sans">
    <rect x="28" y="544" width="502" height="298" rx="14" class="panel"/>
    <text x="58" y="582" class="h2 ink">Replay trace summary</text>
    <g class="mono mono13">
      <text x="58" y="627" class="muted">trace window</text><text x="250" y="627" class="ink">00:00:42.184</text>
      <line x1="58" y1="648" x2="500" y2="648" class="rule"/>
      <text x="58" y="682" class="muted">frames replayed</text><text x="250" y="682" class="ink">4,096</text>
      <text x="58" y="722" class="muted">mismatches</text><text x="250" y="722" class="green" font-weight="850">0</text>
      <text x="58" y="762" class="muted">determinism seed</text><text x="250" y="762" class="ink">locked</text>
      <text x="58" y="802" class="muted">forensic notes</text><text x="250" y="802" class="ink">chain intact</text>
    </g>
  </g>
  <g class="sans">
    <rect x="554" y="544" width="568" height="298" rx="14" class="panel"/>
    <text x="584" y="582" class="h2 ink">Compression comparison</text>
    <g class="mono mono13">
      <text x="584" y="626" class="muted">source</text><text x="782" y="626" class="muted">raw tokens</text><text x="934" y="626" class="muted">KVTC-V7</text><text x="1042" y="626" class="muted">ratio</text>
      <line x1="584" y1="646" x2="1092" y2="646" class="rule"/>
      <text x="584" y="681" class="ink">kernel diagnostics</text><text x="800" y="681" class="ink">18,420</text><text x="948" y="681" class="ink">6,214</text><text x="1042" y="681" class="green" font-weight="850">2.96x</text>
      <text x="584" y="726" class="ink">service incident</text><text x="800" y="726" class="ink">11,008</text><text x="948" y="726" class="ink">3,902</text><text x="1042" y="726" class="green" font-weight="850">2.82x</text>
      <text x="584" y="771" class="ink">network replay</text><text x="800" y="771" class="ink">26,771</text><text x="948" y="771" class="ink">8,931</text><text x="1042" y="771" class="green" font-weight="850">3.00x</text>
      <line x1="584" y1="796" x2="1092" y2="796" class="rule"/>
      <text x="584" y="824" class="muted">validated deterministic mean</text><text x="1042" y="824" class="ink" font-weight="850">2.93x</text>
    </g>
  </g>
  <g class="sans">
    <rect x="1146" y="544" width="426" height="298" rx="14" class="panel"/>
    <text x="1176" y="582" class="h2 ink">Forensic audit indicators</text>
    <g class="mono mono13">
      <rect x="1176" y="612" width="356" height="42" rx="9" class="green-bg"/><text x="1196" y="638" class="green" font-weight="850">✓ chain-of-custody hashes verified</text>
      <rect x="1176" y="670" width="356" height="42" rx="9" class="green-bg"/><text x="1196" y="696" class="green" font-weight="850">✓ replay output byte-stable</text>
      <rect x="1176" y="728" width="356" height="42" rx="9" class="blue-bg"/><text x="1196" y="754" class="blue" font-weight="850">● evidence published to CI artifacts</text>
      <rect x="1176" y="786" width="356" height="42" rx="9" class="amber-bg"/><text x="1196" y="812" class="amber" font-weight="850">! local runner marked degraded</text>
    </g>
  </g>
</svg>
