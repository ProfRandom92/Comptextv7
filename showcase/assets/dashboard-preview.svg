    <radialGradient id="cyan" cx="10%" cy="0" r="80%"><stop offset="0" stop-color="#1ad8ff" stop-opacity=".2"/><stop offset="1" stop-color="#1ad8ff" stop-opacity="0"/></radialGradient>
