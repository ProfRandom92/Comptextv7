<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Comptextv7 social preview</title>
  <desc id="desc">Dark enterprise social preview for Industrial AI Token Compression with cloud validation, artifacts, and dashboard layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="0.48" stop-color="#0a1021"/>
      <stop offset="1" stop-color="#190b32"/>
    </linearGradient>
    <radialGradient id="auraCyan" cx="12%" cy="8%" r="70%">
      <stop offset="0" stop-color="#1ad8ff" stop-opacity="0.22"/>
      <stop offset="0.48" stop-color="#1ad8ff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#1ad8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraViolet" cx="92%" cy="12%" r="62%">
      <stop offset="0" stop-color="#7c3cff" stop-opacity="0.22"/>
      <stop offset="0.52" stop-color="#7c3cff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#7c3cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse" patternTransform="skewX(-12)">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="#75a7d8" stroke-opacity="0.15" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-30%" y="-40%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0" stop-color="#68f3ff"/>
      <stop offset="1" stop-color="#2cc8f0"/>
    </linearGradient>
    <style>
      .sans{font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif}
      .mono{font-family:"SFMono-Regular", "JetBrains Mono", Consolas, monospace}
      .muted{fill:#9eb0c7}.body{fill:#d8e3f2}.bright{fill:#f7fbff}.cyan{fill:#85edff}.stroke{stroke:#5f83ae;stroke-opacity:.62}
      .node{fill:#0e1728;stroke:#5c87b7;stroke-opacity:.78}.card{fill:#080f1d;stroke:#6188b6;stroke-opacity:.72}
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#auraCyan)"/>
  <rect width="1280" height="640" fill="url(#auraViolet)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.9"/>

  <g opacity="0.74" fill="none" stroke="#4acfff" stroke-width="2">
    <path d="M752 151 L971 211 L851 360 L1081 431" stroke-opacity="0.35"/>
    <path d="M752 151 L651 461 L851 360" stroke-opacity="0.43"/>
  </g>
  <g class="sans" font-weight="700" font-size="13" text-anchor="middle">
    <g transform="translate(752 151)"><rect class="node" x="-56" y="-22" width="112" height="44" rx="12"/><circle r="4" fill="#60eaff" filter="url(#glow)"/><text y="5" fill="#cbd9eb">Actions</text></g>
    <g transform="translate(971 211)"><rect class="node" x="-56" y="-22" width="112" height="44" rx="12"/><circle r="4" fill="#60eaff" filter="url(#glow)"/><text y="5" fill="#cbd9eb">Artifacts</text></g>
    <g transform="translate(851 360)"><rect class="node" x="-56" y="-22" width="112" height="44" rx="12"/><circle r="4" fill="#60eaff" filter="url(#glow)"/><text y="5" fill="#cbd9eb">Dashboard</text></g>
    <g transform="translate(1081 431)"><rect class="node" x="-56" y="-22" width="112" height="44" rx="12"/><circle r="4" fill="#60eaff" filter="url(#glow)"/><text y="5" fill="#cbd9eb">Consumer</text></g>
  </g>

  <g class="sans">
    <rect x="82" y="78" width="254" height="28" rx="14" fill="#071321" stroke="#61e8ff"/>
    <text x="96" y="97" font-size="13" font-weight="800" letter-spacing="1" fill="#6beeff">CLOUD-FIRST / DETERMINISTIC</text>
    <text x="80" y="221" font-size="76" font-weight="850" class="bright">Comptextv7</text>
    <text x="86" y="274" font-size="34" font-weight="800" class="cyan">Industrial AI Token Compression</text>
    <text x="86" y="323" font-size="25" class="body">Cloud-first validation + deterministic artifacts</text>
    <text x="86" y="362" font-size="18" class="muted">Synthetic diagnostic logs → compact KVTC-V7 frames → evidence surfaces</text>
  </g>

  <g filter="url(#softShadow)" class="sans">
    <g transform="translate(78 425)">
      <rect class="card" width="312" height="141" rx="18"/><text x="22" y="31" font-size="16" font-weight="800" fill="#eef5ff">CI Authority</text>
      <text class="mono" x="22" y="45" font-size="13" fill="#b7c6d9">pytest</text><rect x="18" y="48" width="262" height="8" rx="4" fill="#20324c"/><rect x="18" y="48" width="286" height="8" rx="4" fill="url(#bar)"/>
      <text class="mono" x="22" y="82" font-size="13" fill="#b7c6d9">replay</text><rect x="18" y="83" width="262" height="8" rx="4" fill="#20324c"/><rect x="18" y="83" width="215" height="8" rx="4" fill="url(#bar)"/>
    </g>
    <g transform="translate(418 425)">
      <rect class="card" width="312" height="141" rx="18"/><text x="22" y="31" font-size="16" font-weight="800" fill="#eef5ff">Artifact Model</text>
      <text class="mono" x="22" y="45" font-size="13" fill="#b7c6d9">contracts</text><rect x="18" y="48" width="262" height="8" rx="4" fill="#20324c"/><rect x="18" y="48" width="246" height="8" rx="4" fill="url(#bar)"/>
      <text class="mono" x="22" y="82" font-size="13" fill="#b7c6d9">summary.json</text><rect x="18" y="83" width="262" height="8" rx="4" fill="#20324c"/><rect x="18" y="83" width="190" height="8" rx="4" fill="url(#bar)"/>
    </g>
    <g transform="translate(758 425)">
      <rect class="card" width="312" height="141" rx="18"/><text x="22" y="31" font-size="16" font-weight="800" fill="#eef5ff">Dashboard Layer</text>
      <text class="mono" x="22" y="45" font-size="13" fill="#b7c6d9">validation</text><rect x="18" y="48" width="262" height="8" rx="4" fill="#20324c"/><rect x="18" y="48" width="260" height="8" rx="4" fill="url(#bar)"/>
      <text class="mono" x="22" y="82" font-size="13" fill="#b7c6d9">compression</text><rect x="18" y="83" width="262" height="8" rx="4" fill="#20324c"/><rect x="18" y="83" width="224" height="8" rx="4" fill="url(#bar)"/>
    </g>
  </g>
  <g class="mono" text-anchor="start">
    <text x="1120" y="103" font-size="17" font-weight="800" fill="#6eeeff">KVTC-V7</text>
    <text x="1120" y="128" font-size="14" fill="#99a7bd">artifact rail</text>
  </g>
</svg>
