<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Comptextv7 social preview</title>
  <desc id="desc">Minimal OpenGraph social preview with bold Comptextv7 typography, a central enterprise validation card, and deterministic cloud-first messaging.</desc>
  <defs>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif}.mono{font-family:&quot;SFMono-Regular&quot;,&quot;JetBrains Mono&quot;,Consolas,monospace}
      .bg{fill:#f5f7fa}.ink{fill:#101723}.muted{fill:#5f6b7d}.panel{fill:#ffffff;stroke:#d9dfe9;stroke-width:1.2}.rule{stroke:#e7ebf1;stroke-width:1}.green{fill:#17803d}.green-bg{fill:#e8f5ee}.blue{fill:#245fe8}.blue-bg{fill:#edf3ff}.amber{fill:#9a6400}.amber-bg{fill:#fff4dc}
    </style>
  </defs>
  <rect width="1280" height="640" class="bg"/>
  <rect x="0" y="0" width="1280" height="12" fill="#101723"/>
  <g class="sans">
    <text x="76" y="122" font-size="22" font-weight="850" class="muted">COMPTEXTV7</text>
    <text x="72" y="214" font-size="72" font-weight="900" class="ink">Industrial AI</text>
    <text x="72" y="292" font-size="72" font-weight="900" class="ink">Token Compression</text>
    <text x="78" y="346" font-size="26" class="muted">Cloud-first validation with deterministic artifacts.</text>
  </g>
  <g class="sans" transform="translate(730 116)">
    <rect width="438" height="372" rx="18" class="panel"/>
    <rect x="0" y="0" width="438" height="54" rx="18" fill="#101723"/>
    <text x="26" y="35" fill="#ffffff" font-size="17" font-weight="850">Validation evidence</text>
    <circle cx="388" cy="27" r="6" fill="#3fb950"/>
    <text x="26" y="92" font-size="13" font-weight="850" class="muted">CURRENT CLOUD RUN</text>
    <text x="26" y="130" font-size="34" font-weight="900" class="ink">128 / 128 checks</text>
    <line x1="26" y1="158" x2="412" y2="158" class="rule"/>
    <g class="mono" font-size="15">
      <rect x="26" y="184" width="386" height="44" rx="9" class="green-bg"/><text x="48" y="212" class="green" font-weight="850">✓ deterministic replay passed</text>
      <rect x="26" y="244" width="386" height="44" rx="9" class="blue-bg"/><text x="48" y="272" class="blue" font-weight="850">● CI artifacts published</text>
      <rect x="26" y="304" width="386" height="44" rx="9" class="amber-bg"/><text x="48" y="332" class="amber" font-weight="850">! local runner is degraded-only</text>
    </g>
  </g>
  <g class="sans">
    <rect x="76" y="438" width="188" height="46" rx="23" fill="#101723"/><text x="100" y="468" fill="#ffffff" font-size="15" font-weight="850">KVTC-V7 FRAMES</text>
    <rect x="286" y="438" width="224" height="46" rx="23" fill="#ffffff" stroke="#d9dfe9"/><text x="312" y="468" class="ink" font-size="15" font-weight="850">FORENSIC REPLAY</text>
    <rect x="532" y="438" width="138" height="46" rx="23" fill="#ffffff" stroke="#d9dfe9"/><text x="558" y="468" class="ink" font-size="15" font-weight="850">CI PROOF</text>
  </g>
  <text x="76" y="566" class="mono" font-size="16" fill="#6b7586">Synthetic diagnostic logs → compact validated evidence surfaces</text>
</svg>
