<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Comptextv7 logo</title>
  <desc id="desc">Compact enterprise-tech Comptextv7 logo with a V7 operational replay mark, slate panel, muted blue accents, and off-white lettering.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.96" />
      <stop offset="1" stop-color="#111827" stop-opacity="0.92" />
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#5aa9d6" />
      <stop offset="1" stop-color="#2f81b7" />
    </linearGradient>
    <style>
      .wordmark{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-weight:800;letter-spacing:-1.8px}
      .mono{font-family:&quot;SFMono-Regular&quot;,&quot;JetBrains Mono&quot;,Consolas,monospace;font-weight:700;letter-spacing:2.8px}
      .slate{stroke:#94a3b8}.blue{stroke:url(#blue)}.node{fill:#9ca3af;stroke:#cbd5e1;stroke-width:2}.node-blue{fill:#58a8d6;stroke:#b7e2f7;stroke-width:2}
    </style>
  </defs>
  <rect x="18" y="36" width="684" height="168" rx="34" fill="url(#panel)" />
  <rect x="34" y="52" width="652" height="136" rx="26" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.75" />
  <g transform="translate(86 70)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path class="blue" d="M18 80 H82 Q112 80 112 50 Q112 20 142 20 H194" stroke-width="16" />
    <path class="slate" d="M18 104 H110 M142 104 H184 Q208 104 208 80 Q208 56 184 56 H162" stroke-width="16" />
    <path class="slate" d="M112 136 H194" stroke-width="16" />
    <circle class="node" cx="42" cy="50" r="13" />
    <circle class="node" cx="112" cy="84" r="13" />
    <circle class="node-blue" cx="138" cy="132" r="14" />
  </g>
  <g transform="translate(328 136)">
    <text class="wordmark" x="0" y="0" font-size="66" fill="#f8fafc">comptext<tspan fill="#4aa3d8">v7</tspan></text>
    <text class="mono" x="4" y="34" font-size="13" fill="#94a3b8">DETERMINISTIC OPERATIONAL REPLAY</text>
  </g>
</svg>
