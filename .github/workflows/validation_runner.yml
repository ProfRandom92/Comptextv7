name: hash-companion-validation

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Optional Hash/chilli request identifier to echo in the CFI-01 result payload.
        required: false
        type: string
  pull_request:
  push:
    branches: [main, work]

permissions:
  contents: read
  actions: read

jobs:
  validation-runner:
    name: validation_runner cloud validation
    runs-on: ubuntu-latest
    env:
      CFI_RESULT_PATH: reports/hash-chilli-cloud-ci-result.json
      CFI_SCHEMA_PATH: contracts/hash-chilli-cloud-ci-result.schema.json
      CFI_WORKFLOW_NAME: hash-companion-validation
      CFI_REQUEST_ID: ${{ github.event.inputs.request_id || '' }}
      CFI_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      CFI_BRANCH: ${{ github.head_ref || github.ref_name }}
      CFI_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      CFI_RESULT_ID: gha:${{ github.run_id }}:${{ github.run_attempt }}

    steps:
      - name: Capture requested timestamp
        id: request_time
        run: echo "requested_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python 3.11
        id: setup_python
        uses: actions/setup-python@v5
        continue-on-error: true
        with:
          python-version: '3.11'

      - name: Install package with test dependencies
        id: install
        if: steps.checkout.outcome == 'success' && steps.setup_python.outcome == 'success'
        continue-on-error: true
        run: python -m pip install -e ".[test]"

      - name: Run pytest validation
        id: pytest_validation
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python -m pytest

      - name: Run deterministic replay validation
        id: replay_validation
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python scripts/validate.py replay

      - name: Run token telemetry validation
        id: token_validation
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python scripts/validate.py token

      - name: Run semantic forensic validation
        id: forensic_validation
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python scripts/validate.py forensic

      - name: Run benchmark replay validation
        id: benchmark_validation
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python benchmarks/run_kvtc_v7_benchmarks.py --iterations 1 --warmups 0

      - name: Run dashboard startup validation
        id: dashboard_validation
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: python dashboard/industrial_dashboard.py --once

      - name: Write CFI-01 validation_runner summary artifact
        id: write_summary
        if: always()
        env:
          REQUESTED_AT: ${{ steps.request_time.outputs.requested_at }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_PYTHON_OUTCOME: ${{ steps.setup_python.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest_validation.outcome }}
          REPLAY_OUTCOME: ${{ steps.replay_validation.outcome }}
          TOKEN_OUTCOME: ${{ steps.token_validation.outcome }}
          FORENSIC_OUTCOME: ${{ steps.forensic_validation.outcome }}
          BENCHMARK_OUTCOME: ${{ steps.benchmark_validation.outcome }}
          DASHBOARD_OUTCOME: ${{ steps.dashboard_validation.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          required_outcomes = {
              "checkout": os.environ.get("CHECKOUT_OUTCOME", "skipped"),
              "setup_python": os.environ.get("SETUP_PYTHON_OUTCOME", "skipped"),
              "install": os.environ.get("INSTALL_OUTCOME", "skipped"),
              "pytest": os.environ.get("PYTEST_OUTCOME", "skipped"),
              "replay": os.environ.get("REPLAY_OUTCOME", "skipped"),
              "token": os.environ.get("TOKEN_OUTCOME", "skipped"),
              "forensic": os.environ.get("FORENSIC_OUTCOME", "skipped"),
              "benchmark": os.environ.get("BENCHMARK_OUTCOME", "skipped"),
              "dashboard": os.environ.get("DASHBOARD_OUTCOME", "skipped"),
          }
          if any(value == "cancelled" for value in required_outcomes.values()):
              status = "cancelled"
              summary = "Cloud CI validation was cancelled before producing a pass/fail outcome."
          elif all(value == "success" for value in required_outcomes.values()):
              status = "passed"
              summary = "Cloud CI validation passed for the requested commit."
          else:
              status = "failed"
              failed = ", ".join(name for name, value in required_outcomes.items() if value != "success")
              summary = f"Cloud CI validation failed or skipped: {failed}."[:240]

          payload = {
              "contract": "hash_chilli_cloud_ci_result",
              "contract_version": 1,
              "result_id": os.environ["CFI_RESULT_ID"],
              "request_id": os.environ.get("CFI_REQUEST_ID") or None,
              "runner": "validation_runner",
              "execution_target": "cloud_ci",
              "provider": "github_actions",
              "workflow": os.environ["CFI_WORKFLOW_NAME"],
              "status": status,
              "commit_sha": os.environ["CFI_COMMIT_SHA"],
              "branch": os.environ["CFI_BRANCH"],
              "run_url": os.environ["CFI_RUN_URL"],
              "artifact_url": None,
              "requested_at": os.environ.get("REQUESTED_AT") or datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "completed_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "summary": summary,
              "local_execution": "disabled",
          }

          result_path = Path(os.environ["CFI_RESULT_PATH"])
          result_path.parent.mkdir(parents=True, exist_ok=True)
          result_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as env_file:
              env_file.write(f"CFI_VALIDATION_STATUS={status}\n")
          PY

      - name: Validate CFI-01 summary artifact against schema
        if: always() && steps.write_summary.outcome == 'success'
        env:
          RESULT_PATH: ${{ env.CFI_RESULT_PATH }}
          SCHEMA_PATH: ${{ env.CFI_SCHEMA_PATH }}
        run: |
          python - <<'PY'
          import json
          import re
          import sys
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import urlparse

          result_path = Path(__import__("os").environ["RESULT_PATH"])
          schema_path = Path(__import__("os").environ["SCHEMA_PATH"])
          payload = json.loads(result_path.read_text(encoding="utf-8"))
          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          errors = []

          def json_type(value):
              if value is None:
                  return "null"
              if isinstance(value, bool):
                  return "boolean"
              if isinstance(value, int) and not isinstance(value, bool):
                  return "integer"
              if isinstance(value, (int, float)) and not isinstance(value, bool):
                  return "number"
              if isinstance(value, str):
                  return "string"
              if isinstance(value, list):
                  return "array"
              if isinstance(value, dict):
                  return "object"
              return type(value).__name__

          def accepts_type(value, expected):
              expected_types = expected if isinstance(expected, list) else [expected]
              return json_type(value) in expected_types or (json_type(value) == "integer" and "number" in expected_types)

          for field in schema.get("required", []):
              if field not in payload:
                  errors.append(f"missing required field: {field}")

          if schema.get("additionalProperties") is False:
              allowed = set(schema.get("properties", {}))
              for field in payload:
                  if field not in allowed:
                      errors.append(f"unexpected field: {field}")

          for field, definition in schema.get("properties", {}).items():
              if field not in payload:
                  continue
              value = payload[field]
              if "type" in definition and not accepts_type(value, definition["type"]):
                  errors.append(f"{field} has type {json_type(value)}, expected {definition['type']}")
                  continue
              if "const" in definition and value != definition["const"]:
                  errors.append(f"{field} does not match const {definition['const']!r}")
              if "enum" in definition and value not in definition["enum"]:
                  errors.append(f"{field} is not one of {definition['enum']!r}")
              if isinstance(value, str):
                  if "minLength" in definition and len(value) < definition["minLength"]:
                      errors.append(f"{field} is shorter than {definition['minLength']}")
                  if "maxLength" in definition and len(value) > definition["maxLength"]:
                      errors.append(f"{field} is longer than {definition['maxLength']}")
                  if "pattern" in definition and not re.fullmatch(definition["pattern"], value):
                      errors.append(f"{field} does not match required pattern")
                  if definition.get("format") == "uri" and not urlparse(value).scheme:
                      errors.append(f"{field} is not a URI")
                  if definition.get("format") == "date-time":
                      try:
                          datetime.fromisoformat(value.replace("Z", "+00:00"))
                      except ValueError:
                          errors.append(f"{field} is not a date-time")

          if errors:
              print("CFI-01 summary artifact failed schema validation:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)
          print(f"CFI-01 summary artifact validated against {schema_path}.")
          PY

      - name: Publish CFI summary to job summary
        if: always() && hashFiles(env.CFI_RESULT_PATH) != ''
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          payload = json.loads(Path("reports/hash-chilli-cloud-ci-result.json").read_text(encoding="utf-8"))
          print("## validation_runner CFI-01 summary")
          print("")
          for field in ("status", "summary", "commit_sha", "branch", "run_url", "artifact_url", "local_execution"):
              print(f"- `{field}`: `{payload[field]}`")
          PY

      - name: Upload CFI-01 validation_runner summary artifact
        if: always() && hashFiles(env.CFI_RESULT_PATH) != ''
        uses: actions/upload-artifact@v4
        with:
          name: validation-runner-cfi-summary
          path: ${{ env.CFI_RESULT_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Enforce validation_runner outcome
        if: always()
        run: |
          if [ "${CFI_VALIDATION_STATUS:-failed}" != "passed" ]; then
            echo "validation_runner completed with status: ${CFI_VALIDATION_STATUS:-failed}"
            exit 1
          fi
          echo "validation_runner completed with status: passed"
